<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบค้นหาเพื่อนใกล้เคียง | Location GPT-4</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --glass-bg: rgba(255, 255, 255, 0.1);
      --glass-border: rgba(255, 255, 255, 0.2);
      --text-main: #ffffff;
      --text-muted: #e0e0e0;
      --accent: #00f2fe;
      --accent-grad: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
      --card-bg: rgba(255, 255, 255, 0.15);
    }

    /* สไตล์ธีมสว่าง (กดเปลี่ยนได้ที่ปุ่มรูปดวงอาทิตย์) */
    body.light-theme {
      --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      --glass-bg: rgba(255, 255, 255, 0.8);
      --glass-border: rgba(255, 255, 255, 0.5);
      --text-main: #2d3748;
      --text-muted: #718096;
      --accent: #4facfe;
      --card-bg: rgba(255, 255, 255, 0.9);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Kanit', sans-serif;
    }

    body {
      height: 100vh;
      background: var(--bg-gradient);
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--text-main);
      overflow: hidden;
      transition: all 0.5s ease;
    }

    /* กล่องแอปพลิเคชันหลัก */
    .app-container {
      width: 100%;
      max-width: 420px;
      height: 85vh;
      min-height: 600px;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 30px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* Header */
    .app-header {
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--glass-border);
    }

    .brand-title {
      font-size: 1.2rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-title i {
      color: var(--accent);
    }

    .header-actions {
      display: flex;
      gap: 15px;
      font-size: 1.2rem;
      cursor: pointer;
    }

    /* ส่วนเนื้อหา (แสดงผลสลับระหว่างแชท กับ เรดาร์สแกนคน) */
    .app-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    /* === ลูกเล่นที่ 1: ระบบเรดาร์สแกนหาคน === */
    .radar-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .radar-circle {
      width: 200px;
      height: 200px;
      border: 2px solid var(--accent);
      border-radius: 50%;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 15px var(--accent);
    }

    .radar-circle::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      border: 1px solid var(--accent);
      border-radius: 50%;
      animation: pulse 2s linear infinite;
    }

    .radar-scanner {
      position: absolute;
      width: 50%;
      height: 50%;
      background: linear-gradient(45deg, transparent 50%, var(--accent) 100%);
      top: 0;
      left: 0;
      transform-origin: bottom right;
      animation: scan 4s linear infinite;
      border-radius: 100% 0 0 0;
      opacity: 0.4;
    }

    @keyframes scan {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(1.6); opacity: 0; }
    }

    /* === ลูกเล่นที่ 2: Card รายชื่อคนที่อยู่ใกล้ๆ === */
    .people-cards {
      margin-top: 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      width: 100%;
    }

    .person-card {
      background: var(--card-bg);
      border: 1px solid var(--glass-border);
      border-radius: 15px;
      padding: 15px;
      text-align: center;
      transition: transform 0.3s ease;
      cursor: pointer;
    }

    .person-card:hover {
      transform: translateY(-5px);
      background: rgba(255, 255, 255, 0.25);
    }

    .avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      margin: 0 auto 10px;
      background: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #fff;
    }

    .dist-tag {
      display: inline-block;
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 10px;
      background: var(--accent-grad);
      color: #fff;
      margin-top: 5px;
    }

    /* === ส่วนแชทเดิมแต่ทำให้สวยขึ้น === */
    .chat-section {
      display: none; /* เริ่มต้นซ่อนไว้ ให้ไปโชว์ที่เรดาร์ก่อน */
      flex-direction: column;
      height: 100%;
    }

    .msg-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .msg {
      display: flex;
      gap: 10px;
      max-width: 80%;
    }

    .msg.bot { align-self: flex-start; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }

    .msg-bubble {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 0.9rem;
      line-height: 1.4;
    }

    .msg.bot .msg-bubble {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 0 18px 18px 18px;
    }

    .msg.user .msg-bubble {
      background: var(--accent-grad);
      color: #fff;
      border-radius: 18px 0 18px 18px;
    }

    /* ช่องพิมพ์แชท */
    .input-area {
      display: flex;
      gap: 10px;
      padding: 15px 0 0;
      border-top: 1px solid var(--glass-border);
    }

    .input-area input {
      flex: 1;
      border: none;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 12px 15px;
      color: var(--text-main);
      outline: none;
    }

    .input-area input::placeholder { color: var(--text-muted); }

    .btn-send {
      width: 45px;
      height: 45px;
      border: none;
      border-radius: 12px;
      background: var(--accent-grad);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s;
    }

    .btn-send:active { transform: scale(0.9); }

    /* ซ่อน scrollbar */
    ::-webkit-scrollbar { width: 0px; }
  </style>
</head>
<body onload="gpsLocation()">

  <div class="app-container">
    <header class="app-header">
      <div class="brand-title">
        <i class="fa-solid fa-earth-asia fa-spin" style="--fa-animation-duration: 5s;"></i>
        <span>NearMe GPT-4</span>
      </div>
      <div class="header-actions">
        <i class="fa-solid fa-sun" id="themeBtn" onclick="toggleTheme()" title="เปลี่ยนธีม"></i>
        <i class="fa-solid fa-compass" id="navBtn" onclick="toggleView()" title="เปิดเมนูแชท"></i>
      </div>
    </header>

    <div class="app-content" id="radarView">
      <div class="radar-container">
        <div class="radar-circle">
          <div class="radar-scanner"></div>
          <i class="fa-solid fa-street-view fa-2x" style="color: #fff;"></i>
        </div>
        <p style="margin-top: 25px; font-weight: 500;">กำลังค้นหาคนที่อยู่ใกล้คุณ...</p>
        <p style="font-size: 0.85rem; color: var(--text-muted);">เปิดแชร์ตำแหน่งเพื่อความแม่นยำ</p>
      </div>

      <div class="people-cards">
        <div class="person-card" onclick="startChat('น้องมินนี่')">
          <div class="avatar" style="background: #ff6b6b;">M</div>
          <div>น้องมินนี่</div>
          <span class="dist-tag">0.5 กม.</span>
        </div>
        <div class="person-card" onclick="startChat('บอส คิม')">
          <div class="avatar" style="background: #4ecdc4;">K</div>
          <div>บอส คิม</div>
          <span class="dist-tag">1.2 กม.</span>
        </div>
      </div>
    </div>

    <div class="app-content chat-section" id="chatView">
      <div class="msg-list" id="msgList">
        <div class="msg bot">
          <div class="msg-bubble">
            สวัสดีค่ะ! ยินดีต้อนรับสู่ระบบค้นหาเพื่อนตามพิกัด 📍 ตอนนี้ระบบกำลังแชร์พิกัดของคุณแบบ Real-time ค่ะ
          </div>
        </div>
      </div>

      <form class="input-area" onsubmit="sendMessage(event)">
        <input type="text" id="userInput" placeholder="พิมพ์ข้อความที่นี่...">
        <button type="submit" class="btn-send">
          <i class="fa-solid fa-paper-plane"></i>
        </button>
      </form>
    </div>
  </div>

  <script>
    // ลูกเล่นสลับธีม มืด/สว่าง
    function toggleTheme() {
      const body = document.body;
      const themeBtn = document.getElementById('themeBtn');
      
      body.classList.toggle('light-theme');
      
      if(body.classList.contains('light-theme')) {
        themeBtn.className = "fa-solid fa-moon";
      } else {
        themeBtn.className = "fa-solid fa-sun";
      }
    }

    // ลูกเล่นสลับมุมมองระหว่าง เรดาร์สแกน กับ แชท
    function toggleView() {
      const radarView = document.getElementById('radarView');
      const chatView = document.getElementById('chatView');
      const navBtn = document.getElementById('navBtn');

      if (chatView.style.display === "none" || chatView.style.display === "") {
        radarView.style.display = "none";
        chatView.style.display = "flex";
        navBtn.className = "fa-solid fa-radar fa-spin";
      } else {
        radarView.style.display = "flex";
        chatView.style.display = "none";
        navBtn.className = "fa-solid fa-compass";
      }
    }

    // ฟังก์ชันกดที่การ์ดคน แล้วสลับมาแชทด้วยทันที
    function startChat(name) {
      toggleView();
      const msgList = document.getElementById('msgList');
      msgList.innerHTML += `
        <div class="msg bot">
          <div class="msg-bubble">
            คุณเริ่มคุยกับ <b>${name}</b> แล้ว ทักทายเขาได้เลยค่ะ!
          </div>
        </div>
      `;
      // เลื่อนหน้าต่างลงล่างสุด
      msgList.scrollTop = msgList.scrollHeight;
    }

    // ระบบแชท โต้ตอบได้จริง
    function sendMessage(e) {
      e.preventDefault();
      const input = document.getElementById('userInput');
      const msgList = document.getElementById('msgList');

      if (input.value.trim() === '') return;

      // พิมพ์ฝั่ง User
      msgList.innerHTML += `
        <div class="msg user">
          <div class="msg-bubble">${input.value}</div>
        </div>
      `;

      const userTxt = input.value;
      input.value = '';
      msgList.scrollTop = msgList.scrollHeight;

      // จำลอง Bot ตอบกลับอัตโนมัติใน 1 วินาที
      setTimeout(() => {
        msgList.innerHTML += `
          <div class="msg bot">
            <div class="msg-bubble">คุณเพิ่งพูดว่า "${userTxt}" ใช่ไหมคะ? ระบบบันทึกข้อความไว้แล้วค่ะ 😊</div>
          </div>
        `;
        msgList.scrollTop = msgList.scrollHeight;
      }, 1000);
    }

    // ฟังก์ชันดักพิกัดเดิมของคุณ
    function gpsLocation() {
      console.log("พิกัดกำลังถูกเรียกทำงาน...");
      // ใส่ logic ดึง GPS ใน script.js ของคุณต่อได้เลย
    }
  </script>
</body>
</html>
